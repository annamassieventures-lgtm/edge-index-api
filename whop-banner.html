<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1500px;
    height: 500px;
    background: #0a0a0a;
    font-family: 'Arial Black', 'Impact', sans-serif;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 100px;
  }
  .left {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .headline-white {
    font-size: 88px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 2px;
    line-height: 1;
    text-transform: uppercase;
  }
  .headline-gold {
    font-size: 88px;
    font-weight: 900;
    color: #C9A84C;
    letter-spacing: 2px;
    line-height: 1;
    text-transform: uppercase;
  }
  .subtext {
    font-size: 22px;
    font-weight: 400;
    color: #888888;
    font-family: 'Arial', sans-serif;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }
  .right {
    display: flex;
    flex-direction: column;
    gap: 32px;
    align-items: flex-start;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .check {
    color: #C9A84C;
    font-size: 36px;
    font-weight: 900;
    line-height: 1;
  }
  .check-label {
    font-size: 44px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 1px;
    font-family: 'Arial Black', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="headline-white">THE</div>
      <div class="headline-gold">EDGE INDEX.</div>
    </div>
  </div>
</body>
</html>
